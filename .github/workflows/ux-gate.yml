name: UX Gate

on:
  pull_request:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ux-check:
    name: Check Figma link for UI changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect UI file changes
        id: ui_changes
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          UI_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E \
            'res/layout/|res/menu/|Activity\.kt$|Fragment\.kt$|Adapter\.kt$|res/values/strings\.xml' \
            | wc -l)

          echo "ui_changed=$UI_CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed UI files: $UI_CHANGED"

      - name: Check for Figma link or explicit no-UI declaration in PR body
        id: figma_check
        if: steps.ui_changes.outputs.ui_changed != '0'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Pass if a real Figma URL is present.
          if echo "$PR_BODY" | grep -qiE 'figma\.com/design/|figma\.com/proto/|figma\.com/board/'; then
            echo "has_figma=true" >> "$GITHUB_OUTPUT"
          # Also pass if the "No — purely logic/backend change" checkbox is explicitly checked.
          # This covers Activity.kt edits that touch only logic, not layout or visible behaviour.
          elif echo "$PR_BODY" | grep -qiE '\[x\]\s*No\s*—\s*purely\s*logic'; then
            echo "has_figma=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_figma=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post warning comment
        if: >
          steps.ui_changes.outputs.ui_changed != '0' &&
          steps.figma_check.outputs.has_figma == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### ⚠️ UX Gate — Figma link missing

            This PR modifies UI files but the description doesn't include a Figma link.

            **Why this matters:** Reviewing UX in Figma before merging helps catch usability issues early and keeps the design file in sync with the app.

            **What to do:**
            1. Open the [Sushi Figma file](https://www.figma.com/design/heP71zbxhc6Mtgpghp0dDw/Sushi)
            2. Add a frame to the **Proposals** page showing the intended UX for this change
            3. Paste the frame link into the PR description under **Figma frame**

            _This is a soft warning — you can merge without it, but please add the link when you can._`;

            // Only post if no existing warning comment from this bot
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('UX Gate — Figma link missing')
            );

            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post approval comment
        if: >
          steps.ui_changes.outputs.ui_changed != '0' &&
          steps.figma_check.outputs.has_figma == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve any previous warning by checking if one exists — no action needed,
            // the Figma link is present. Just log for visibility.
            console.log('Figma link found in PR body. UX gate passed.');
