name: UX Gate

on:
  pull_request:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ux-check:
    name: Check Figma link for UI changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect UI file changes
        id: ui_changes
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          UI_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E \
            'res/layout/|res/menu/|Activity\.kt$|Fragment\.kt$|Adapter\.kt$|res/values/strings\.xml' \
            | wc -l)

          echo "ui_changed=$UI_CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed UI files: $UI_CHANGED"

      - name: Check for Figma link or explicit no-UI declaration in PR body
        id: figma_check
        if: steps.ui_changes.outputs.ui_changed != '0'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Pass if a real Figma URL is present.
          if echo "$PR_BODY" | grep -qiE 'figma\.com/design/|figma\.com/proto/|figma\.com/board/'; then
            echo "has_figma=true" >> "$GITHUB_OUTPUT"
          # Also pass if the "No — purely logic/backend change" checkbox is explicitly checked.
          # This covers Activity.kt edits that touch only logic, not layout or visible behaviour.
          elif echo "$PR_BODY" | grep -qiE '\[x\]\s*No\s*—\s*purely\s*logic'; then
            echo "has_figma=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_figma=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post warning comment
        if: >
          steps.ui_changes.outputs.ui_changed != '0' &&
          steps.figma_check.outputs.has_figma == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### ⚠️ UX Gate — Figma link missing

            This PR modifies UI files but the description doesn't include a Figma link
            or an explicit confirmation that no visible behaviour changed.

            **Why this matters:** Catching unintended UI changes early is especially
            important with AI-assisted coding — models may touch layouts incidentally.

            **What to do — pick one:**
            1. Add a frame to the [Sushi Figma file](https://www.figma.com/design/heP71zbxhc6Mtgpghp0dDw/Sushi) (Proposals page) and paste the frame link into the PR description under **Figma frame**. Use a frame-level link, not the file root URL, to keep the file ID out of public history.
            2. Or check **No — purely logic/backend change** in the PR template if the Activity.kt change is purely logic with no visible effect.

            _This is a soft warning — you can merge without it, but please resolve it when you can._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('UX Gate — Figma link missing')
            );

            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post approval comment
        if: >
          steps.ui_changes.outputs.ui_changed != '0' &&
          steps.figma_check.outputs.has_figma == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('UX gate passed — Figma link present or no-UI change confirmed.');
